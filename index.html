<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divide & Conquer Algorithms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Divide & Conquer Algorithms</h1>

    <div class="container">
        <select id="algorithm">
            <option value="merge">Merge Sort</option>
            <option value="quick">Quick Sort</option>
            <option value="heap">Heap Sort</option>
            <option value="binary">Binary Search</option>
            <option value="strassen">Strassen's Matrix Multiply</option>
            <option value="maxmin">Max & Min</option>
            <option value="power">Power (Exponentiation)</option>
            <option value="peak">Peak Element</option>
        </select>

        <input type="text" id="input" placeholder="Enter array (e.g. 5,2,9,1)">
        <input type="number" id="key" placeholder="Key (for Binary Search)">
        <button onclick="runAlgorithm()">▶️ Run Algorithm</button>

        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
